version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: acadlink-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: Acadlink
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Support@2525
    ports:
      - "5432:5432"
    volumes:
      - acadlink_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d Acadlink"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    image: acadlink-backend:1.0.0
    container_name: acadlink-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/Acadlink
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: Support@2525
    ports:
      - "8080:8080"

volumes:
  acadlink_pgdata:
